<!DOCTYPE html>
<html lang="sr">
<head>
  <!-- ===== SEO META TAGOVI ===== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SerijaStar – platforma za ocenjivanje TV serija i epizoda. Ocenjuj, komentariši i deli mišljenje sa zajednicom ljubitelja serija.">
  <meta name="keywords" content="serije, ocenjivanje serija, TV epizode, komentari serija, SerijaStar, oceni seriju">
  <meta name="author" content="SerijaStar Tim">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="SerijaStar – Ocenjivanje serija">
  <meta property="og:description" content="Ocenjuj epizode, ostavljaj komentare i pridruži se zajednici.">
  <meta property="og:type" content="website">
  <title>SerijaStar – Prijava</title>
  <link rel="stylesheet" href="css/stil.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; overflow:hidden; }

    /* Animirane čestice */
    .cestica { position:fixed; border-radius:50%; pointer-events:none; animation:letanje linear infinite; opacity:0; }
    @keyframes letanje { 0%{transform:translateY(110vh) scale(0);opacity:0} 8%{opacity:.6} 92%{opacity:.6} 100%{transform:translateY(-10vh) scale(1.5);opacity:0} }

    /* Login kartica */
    .login-k {
      background:var(--kartica); border:1px solid rgba(212,175,55,.28); border-radius:20px;
      padding:50px 44px; width:100%; max-width:460px; position:relative; z-index:10;
      box-shadow:0 0 0 1px rgba(212,175,55,.04), 0 20px 60px rgba(0,0,0,.7), 0 0 50px rgba(212,175,55,.07);
      animation:pojavi .7s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes pojavi { from{opacity:0;transform:translateY(40px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
    .login-k::before { content:''; position:absolute; top:0; left:15%; right:15%; height:2px; background:linear-gradient(90deg,transparent,var(--zlato),var(--zlato-sv),var(--zlato),transparent); border-radius:0 0 4px 4px; box-shadow:0 0 20px rgba(212,175,55,.5); }

    /* Logo */
    .logo-z { text-align:center; margin-bottom:30px; }
    .logo-ikona-k { width:70px; height:70px; background:linear-gradient(135deg,rgba(212,175,55,.14),rgba(212,175,55,.04)); border:1px solid rgba(212,175,55,.3); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 14px; font-size:2rem; animation:puls 3s ease-in-out infinite; }
    @keyframes puls { 0%,100%{box-shadow:0 0 20px rgba(212,175,55,.2)} 50%{box-shadow:0 0 35px rgba(212,175,55,.45)} }
    .logo-n { font-family:var(--font-n); font-size:2.2rem; font-weight:900; letter-spacing:3px; background:linear-gradient(135deg,var(--zlato-sv),var(--zlato),var(--srebro)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-sub { font-size:.7rem; letter-spacing:5px; text-transform:uppercase; color:var(--srebro-t); margin-top:4px; }

    .div-linija { height:1px; background:linear-gradient(90deg,transparent,rgba(212,175,55,.35),transparent); margin:22px 0; }

    /* Tabovi */
    .tab-nav { display:grid; grid-template-columns:1fr 1fr; gap:6px; background:rgba(5,5,12,.6); padding:5px; border-radius:12px; border:1px solid rgba(212,175,55,.1); margin-bottom:26px; }
    .tab-b { padding:10px 8px 8px; border:none; background:transparent; color:var(--tekst2); font-family:var(--font-t); font-size:.85rem; font-weight:500; border-radius:8px; transition:var(--tr); display:flex; flex-direction:column; align-items:center; gap:3px; }
    .tab-b .ik { font-size:1.2rem; }
    .tab-b.ak { background:linear-gradient(135deg,rgba(160,124,32,.85),rgba(212,175,55,.85)); color:#07070F; font-weight:700; box-shadow:0 2px 15px rgba(212,175,55,.25); }
    .tab-b:not(.ak):hover { background:rgba(212,175,55,.08); color:var(--zlato); }

    .tab-sadrzaj { display:none; }
    .tab-sadrzaj.vis { display:block; animation:fadeIn .35s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* Prijava dugme */
    .btn-login { width:100%; padding:15px; background:linear-gradient(135deg,var(--zlato-t),var(--zlato),var(--zlato-sv)); border:none; border-radius:10px; color:#07070F; font-family:var(--font-t); font-size:.93rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; transition:var(--tr); position:relative; overflow:hidden; margin-top:6px; }
    .btn-login::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent); transform:translateX(-100%); transition:transform .5s ease; }
    .btn-login:hover::after { transform:translateX(100%); }
    .btn-login:hover { box-shadow:0 6px 30px rgba(212,175,55,.5); transform:translateY(-2px); }

    /* Greška */
    .greska-b { background:rgba(180,40,40,.12); border:1px solid rgba(220,60,60,.35); border-radius:10px; padding:11px 15px; color:#FF8080; font-size:.88rem; margin-bottom:14px; display:none; animation:treskanje .4s ease; }
    @keyframes treskanje { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .greska-p { border-color:rgba(220,60,60,.6)!important; animation:treskanje .4s ease; }

    /* Demo info */
    .demo-z { margin-top:22px; padding:15px 18px; background:rgba(212,175,55,.04); border:1px solid rgba(212,175,55,.12); border-radius:12px; text-align:center; font-size:.8rem; color:var(--tekst2); line-height:2; }
    .demo-z strong { color:var(--zlato); font-weight:600; }
    .demo-z em { color:var(--srebro-t); font-style:italic; font-size:.72rem; }

    /* Pristupačnost u login */
    .acc-login { position:fixed; top:16px; right:16px; display:flex; gap:8px; z-index:200; }
  </style>
</head>
<body>

<!-- Pristupačnost: tema i font -->
<div class="acc-login">
  <button class="btn-acc" id="btn-tema" onclick="togglujTemu()" title="Promeni temu">☀️</button>
  <button class="btn-acc" onclick="povecajFont()" title="Povećaj font">A+</button>
  <button class="btn-acc" onclick="smanjiFont()"  title="Smanji font">A-</button>
</div>

<!-- Čestice u pozadini (JS ih kreira ispod) -->
<div id="cestice-k"></div>

<!-- LOGIN KARTICA -->
<div class="login-k">

  <!-- LOGO -->
  <!-- Zameni div.logo-ikona-k sa: <img src="slike/logo.png" alt="SerijaStar logo" style="width:70px;height:70px;border-radius:50%;"> -->
  <div class="logo-z">
    <div class="logo-ikona-k" aria-label="SerijaStar logo">▶</div>
    <div class="logo-n">SerijaStar</div>
    <div class="logo-sub">Ocenjivanje serija</div>
  </div>

  <div class="div-linija"></div>

  <!-- TABOVI -->
  <div class="tab-nav" role="tablist" aria-label="Izbor uloge">
    <button class="tab-b ak" role="tab" aria-selected="true"  onclick="prikaziTab('admin')" id="tb-admin">
      <span class="ik" aria-hidden="true">👑</span>Admin
    </button>
    <button class="tab-b"    role="tab" aria-selected="false" onclick="prikaziTab('user')"  id="tb-user">
      <span class="ik" aria-hidden="true">👤</span>Korisnik
    </button>
  </div>

  <!-- GREŠKA -->
  <div class="greska-b" id="greska" role="alert" aria-live="polite"></div>

  <!-- ADMIN FORMA -->
  <div class="tab-sadrzaj vis" id="tab-admin" role="tabpanel">
    <div class="polje-g">
      <label for="a-user">Korisničko ime</label>
      <input type="text" id="a-user" placeholder="Admin" autocomplete="off"
             onkeydown="if(event.key==='Enter')login()" aria-required="true">
    </div>
    <div class="polje-g">
      <label for="a-pass">Lozinka</label>
      <input type="password" id="a-pass" placeholder="••••••"
             onkeydown="if(event.key==='Enter')login()" aria-required="true">
    </div>
    <button class="btn-login" onclick="login()" aria-label="Prijavi se kao administrator">Prijavi se kao Admin</button>
  </div>

  <!-- USER FORMA -->
  <div class="tab-sadrzaj" id="tab-user" role="tabpanel">
    <div class="polje-g">
      <label for="u-user">Korisničko ime</label>
      <input type="text" id="u-user" placeholder="User" autocomplete="off"
             onkeydown="if(event.key==='Enter')login()" aria-required="true">
    </div>
    <div class="polje-g">
      <label for="u-pass">Lozinka</label>
      <input type="password" id="u-pass" placeholder="••••••"
             onkeydown="if(event.key==='Enter')login()" aria-required="true">
    </div>
    <button class="btn-login" onclick="login()" aria-label="Prijavi se kao korisnik">Prijavi se kao Korisnik</button>
  </div>

  <!-- DEMO INFO -->
  <div class="demo-z">
    Admin: <strong>Admin / Admin</strong> &nbsp;·&nbsp; Korisnik: <strong>User / User</strong><br>
    <em>Nove korisnike dodaje Admin u svom panelu (čuvaju se u localStorage)</em>
  </div>
</div>

<script src="js/core.js"></script>
<script>
  /* ==========================================
     LOGIN LOGIKA
     ========================================== */
  let aktivniTab = 'admin';

  // Ako je već ulogovan – preusmeri odmah
  (function() {
    const s = citajSesiju();
    if (s.k && s.u) window.location.href = s.u==='admin' ? 'admin.html' : 'user.html';
  })();

  // Postavi ikonicu teme
  document.getElementById('btn-tema').textContent =
    (localStorage.getItem('ss_tema')||'tamna') === 'tamna' ? '☀️' : '🌙';

  function prikaziTab(tab) {
    aktivniTab = tab;
    document.querySelectorAll('.tab-sadrzaj').forEach(t => t.classList.remove('vis'));
    document.querySelectorAll('.tab-b').forEach(b => { b.classList.remove('ak'); b.setAttribute('aria-selected','false'); });
    document.getElementById('tab-'+tab).classList.add('vis');
    document.getElementById('tb-'+tab).classList.add('ak');
    document.getElementById('tb-'+tab).setAttribute('aria-selected','true');
    document.getElementById('greska').style.display = 'none';
  }

  function login() {
    const uEl = document.getElementById(aktivniTab==='admin' ? 'a-user' : 'u-user');
    const pEl = document.getElementById(aktivniTab==='admin' ? 'a-pass' : 'u-pass');
    const username = uEl.value.trim();
    const password = pEl.value;
    const gEl = document.getElementById('greska');

    uEl.classList.remove('greska-p'); pEl.classList.remove('greska-p');

    if (!username) { uEl.classList.add('greska-p'); prikaziGresku('Unesite korisničko ime.'); return; }
    if (!password) { pEl.classList.add('greska-p'); prikaziGresku('Unesite lozinku.'); return; }

    const r = provjeriLogin(username, password);

    if (!r.ok) {
      uEl.classList.add('greska-p'); pEl.classList.add('greska-p');
      prikaziGresku('❌ Pogrešno korisničko ime ili lozinka.');
      return;
    }
    if (r.uloga !== aktivniTab) {
      prikaziGresku(aktivniTab==='admin'
        ? '⚠️ Ovaj nalog nije admin. Koristite tab "Korisnik".'
        : '⚠️ Ovaj nalog je admin. Koristite tab "Admin".');
      return;
    }

    sacuvajSesiju(username, r.uloga);
    window.location.href = r.uloga==='admin' ? 'admin.html' : 'user.html';
  }

  function prikaziGresku(msg) {
    const g = document.getElementById('greska');
    g.textContent = msg; g.style.display = 'block';
  }

  /* ==========================================
     ANIMIRANE ČESTICE U POZADINI
     ========================================== */
  (function kreirajCestice() {
    const k = document.getElementById('cestice-k');
    for (let i = 0; i < 30; i++) {
      const c = document.createElement('div');
      c.className = 'cestica';
      c.style.cssText = `
        left:${Math.random()*100}vw;
        width:${Math.random()*3+1}px; height:${Math.random()*3+1}px;
        animation-duration:${Math.random()*12+8}s;
        animation-delay:${Math.random()*10}s;
        background:${i%3===0?'var(--srebro)':'var(--zlato)'};
      `;
      k.appendChild(c);
    }
  })();
</script>
</body>
</html>
